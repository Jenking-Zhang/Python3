name: Build CPython (Windows)

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "CPython version to build (e.g. 3.12.12, 3.12.13)"
        required: true
        default: "3.12.13"

permissions:
  contents: write  # 创建 Release 需要

jobs:
  build-python:
    runs-on: windows-latest

    env:
      PY_VER: ${{ inputs.python_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show build version
        shell: cmd
        run: |
          echo Building CPython %PY_VER% for Windows x64

      - name: Download CPython source
        shell: cmd
        run: |
          curl -L -o Python-%PY_VER%.tgz https://www.python.org/ftp/python/%PY_VER%/Python-%PY_VER%.tgz

      - name: Extract source
        shell: bash
        run: |
          tar -xvf Python-$PY_VER.tgz

      - name: List extracted content
        shell: cmd
        run: |
          dir
          dir Python-%PY_VER%

      - name: Prepare external deps
        shell: cmd
        run: |
          cd Python-%PY_VER%\PCbuild
          call get_externals.bat

      - name: Build CPython (Release x64)
        shell: cmd
        run: |
          cd Python-%PY_VER%
          call Tools\msi\buildrelease.bat -x64 --pgo -V

      - name: Prepare output directory
        shell: cmd
        run: |
          mkdir output

          echo Copying final release artifacts from en-us...

          copy Python-%PY_VER%\PCbuild\amd64\en-us\python-%PY_VER%-amd64.exe output\
          copy Python-%PY_VER%\PCbuild\amd64\en-us\python-%PY_VER%-embed-amd64.zip output\

      - name: Compute SHA256
        shell: pwsh
        run: |
          $exe = "output\python-$env:PY_VER-amd64.exe"
          $zip = "output\python-$env:PY_VER-embed-amd64.zip"

          $files = @($exe, $zip)
          $hashList = @()

          foreach ($f in $files) {
            if (Test-Path $f) {
              $h = Get-FileHash -Algorithm SHA256 $f
              $hashList += "$($h.Hash)  $(Split-Path $f -Leaf)"
              Write-Host "$f => $($h.Hash)"
            } else {
              Write-Host "WARNING: missing file $f"
            }
          }

          $outFile = "output\SHA256SUMS.txt"
          $hashList | Out-File -FilePath $outFile -Encoding ascii

          # exe hash作为 release 主 hash
          $exeHash = (Get-FileHash -Algorithm SHA256 $exe).Hash
          echo "RELEASE_SHA256=$exeHash" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v7
        with:
          name: cpython-${{ env.PY_VER }}-release
          path: output/*

      - name: Create GitHub Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PY_VER }}-win64
          name: CPython ${{ env.PY_VER }} Windows x64 Release
          body: |
            CPython ${{ env.PY_VER }} Windows x64 Release build.

            SHA256 (exe):
            ${{ env.RELEASE_SHA256 }}

            Files:
            - python-${{ env.PY_VER }}-amd64.exe
            - python-${{ env.PY_VER }}-embed-amd64.zip
            - SHA256SUMS.txt
          files: |
            output/python-${{ env.PY_VER }}-amd64.exe
            output/python-${{ env.PY_VER }}-embed-amd64.zip
            output/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
