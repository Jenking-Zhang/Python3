name: Build CPython (Windows)

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "CPython version to build (e.g. 3.12.10, 3.12.12)"
        required: true
        default: "3.12.12"

permissions:
  contents: write  # 创建 Release 需要

jobs:
  build-python:
    runs-on: windows-latest

    env:
      PY_VER: ${{ inputs.python_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show build version
        run: |
          echo Building CPython %PY_VER% for Windows x64
        shell: cmd

      - name: Download CPython source
        run: |
          curl -L -o Python-%PY_VER%.tgz https://www.python.org/ftp/python/%PY_VER%/Python-%PY_VER%.tgz
        shell: cmd

      - name: Extract source
        run: |
          tar -xvf Python-$PY_VER.tgz
        shell: bash

      - name: List extracted content
        run: |
          dir
          dir Python-%PY_VER%
        shell: cmd

      - name: Prepare external deps
        run: |
          cd Python-%PY_VER%\PCbuild
          call get_externals.bat
        shell: cmd

      - name: Build CPython (Release x64)
        run: |
          cd Python-%PY_VER%\PCbuild
          call build.bat -c Release -p x64
        shell: cmd

      - name: Collect build outputs
        run: |
          mkdir output
          copy Python-%PY_VER%\PCbuild\amd64\* output\
        shell: cmd

      - name: Pack to 7z (max compression)
        run: |
          7z a -t7z -m0=lzma2 -mx=9 -mmt=on cpython-%PY_VER%-win64.7z .\output\*
        shell: cmd

      - name: Compute SHA256 (PowerShell)
        shell: pwsh
        run: |
          $file = "cpython-$env:PY_VER-win64.7z"
          $hash = Get-FileHash -Algorithm SHA256 $file
          Write-Host "Computed SHA256: $($hash.Hash)"
          # write variable for later steps
          echo "RELEASE_SHA256=$($hash.Hash)" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append
          # write a .sha256 file alongside the archive
          $out = "{0}  {1}" -f $hash.Hash, $file
          $out | Out-File -FilePath "cpython-$env:PY_VER-win64.sha256" -Encoding ascii

      - name: Upload artifact (7z)
        uses: actions/upload-artifact@v7
        with:
          name: cpython-${{ env.PY_VER }}-win64
          path: cpython-${{ env.PY_VER }}-win64.7z

      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-${{ env.PY_VER }}-win64-sha256
          path: cpython-${{ env.PY_VER }}-win64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PY_VER }}-win64
          name: CPython ${{ env.PY_VER }} for Windows x64
          body: |
            CPython ${{ env.PY_VER }} for Windows x64, built on GitHub Actions.

            - Version: ${{ env.PY_VER }}
            - Platform: Windows x64
            - Hash (SHA256): ${{ env.RELEASE_SHA256 }}
          files: |
            cpython-${{ env.PY_VER }}-win64.7z
            cpython-${{ env.PY_VER }}-win64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
